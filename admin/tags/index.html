<!DOCTYPE html><html lang="ru" data-astro-cid-tyx6x2na> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script>
	/* Theme — anti-flicker: применяет тему ДО первой отрисовки.
	   Приоритет: явный выбор юзера (localStorage) > системная prefers-color-scheme.
	   Если юзер ничего не нажимал — следуем за OS-настройкой и реагируем на её
	   изменения (для тех у кого macOS автоматически переключает по времени суток). */
	(() => {
		try {
			const stored = localStorage.getItem('theme');
			const mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');

			function apply(isDark) {
				if (isDark) {
					document.documentElement.setAttribute('data-theme', 'dark');
				} else {
					document.documentElement.removeAttribute('data-theme');
				}
			}

			if (stored === 'dark') apply(true);
			else if (stored === 'light') apply(false);
			else if (mq && mq.matches) apply(true);

			/* Слушаем смену OS-темы — но только если юзер сам не выбрал.
			   Manual override wins; иначе следуем за системой live. */
			if (mq && mq.addEventListener) {
				mq.addEventListener('change', (e) => {
					if (localStorage.getItem('theme')) return;
					apply(e.matches);
					window.dispatchEvent(new CustomEvent('themechange'));
				});
			}
		} catch (e) {}
	})();

				// тихо реконсилируем с реальным состоянием репо.
				if (!_autoRefreshDone && localStorage.getItem(LS_PAT_KEY)) {
					_autoRefreshDone = true;
					refreshListFromGitHub({ auto: true });
				}
			}
			async function checkPassword() {
				const v = $('pw').value;
				const hash = await sha256Hex(v);
				if (hash === PASSWORD_SHA256) {
					sessionStorage.setItem(LS_PW_OK_KEY, '1');
					$('pw-err').textContent = '';
					afterPasswordOk();
				} else {
					$('pw-err').textContent = 'неверный пароль';
				}
			}
			function afterPasswordOk() {
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (pat) showApp(); else showPatGate();
			}

			$('pw-btn').addEventListener('click', checkPassword);
			$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPassword(); });

			// Проверка валидности PAT через GET репозитория
			async function verifyPat(pat) {
				const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;
				try {
					const r = await fetch(url, {
						headers: {
							Authorization: 'token ' + pat,
							Accept: 'application/vnd.github+json',
						},
					});
					if (r.status === 200) return { ok: true };
					if (r.status === 401) return { ok: false, code: 401, msg: 'токен невалидный' };
					if (r.status === 403 || r.status === 404) return {
						ok: false, code: r.status,
						msg: 'токен валидный, но нет доступа к репо (нужен scope: repo, или Contents:write для fine-grained)',
					};
					return { ok: false, code: r.status, msg: 'неожиданный статус ' + r.status };
				} catch (e) {
					return { ok: null, networkErr: true, msg: 'не смог проверить (нет сети?)' };
				}
			}

			$('pat-btn').addEventListener('click', async () => {
				const v = $('pat').value.trim();
				if (!v) { $('pat-err').textContent = 'пусто'; return; }
				$('pat-err').textContent = '';
				$('pat-btn').disabled = true;
				$('pat-checking').classList.remove('hidden');
				const res = await verifyPat(v);
				$('pat-checking').classList.add('hidden');
				$('pat-btn').disabled = false;
				if (res.ok === true) {
					localStorage.setItem(LS_PAT_KEY, v);
					showApp();
				} else if (res.networkErr) {
					localStorage.setItem(LS_PAT_KEY, v);
					$('pat-err').textContent = res.msg + ', сохранил';
					setTimeout(() => showApp(), 800);
				} else {
					$('pat-err').textContent = res.msg || 'ошибка';
				}
			});
			$('pat').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('pat-btn').click(); });
			$('pat-skip').addEventListener('click', () => {
				const v = localStorage.getItem(LS_PAT_KEY);
				if (v) showApp(); else $('pat-err').textContent = 'в localStorage пусто, введи';
			});
			$('forget-pat').addEventListener('click', () => {
				if (!confirm('удалить PAT из localStorage?')) return;
				localStorage.removeItem(LS_PAT_KEY);
				location.reload();
			});
			$('refresh-list').addEventListener('click', () => refreshListFromGitHub({ auto: false }));
			// Bootstrap перенесён в самый конец скрипта — иначе `afterPasswordOk()`
			// → showApp() → renderPosts() стрелял ДО декларации `let POSTS = []`
			// (temporal dead zone → ReferenceError → пустая страница).

			// ====================================================
			// data layer
			// ====================================================
			let POSTS = [];
			try {
				POSTS = JSON.parse(document.getElementById('posts-data').textContent || '[]');
			} catch (e) { POSTS = []; }

			POSTS.forEach((p) => {
				p._orig = (p.tags || []).slice();
				p._tags = (p.tags || []).slice();
				p._saveStatus = null;     // null | 'saving' | 'ok' | 'err'
				p._saveMsg = '';
				p._expanded = false;
				p._selected = false;      // multi-select state
				p._stale = false;         // true = файл переименован/удалён на сервере
				p._isNew = false;         // true = появился после build-снэпшота
				p._tagsLoaded = true;     // false = теги нового поста ещё не подтянуты
			});
			// сортировка по дате (desc)
			POSTS.sort((a, b) => (b.pubDate || '').localeCompare(a.pubDate || ''));

			function allTags() {
				return Array.from(new Set(POSTS.flatMap((p) => p._tags)))
					.sort((a, b) => a.localeCompare(b, 'ru'));
			}
			function tagCounts() {
				const m = new Map();
				for (const p of POSTS) {
					for (const t of p._tags) m.set(t, (m.get(t) || 0) + 1);
				}
				return m;
			}
			function isDirty(p) {
				if (p._tags.length !== p._orig.length) return true;
				for (let i = 0; i < p._tags.length; i++) {
					if (p._tags[i] !== p._orig[i]) return true;
				}
				return false;
			}
			function dirtyPosts() { return POSTS.filter(isDirty); }
			function updateDirtyBadge() {
				const n = dirtyPosts().length;
				const el = $('dirty-count');
				if (n === 0) {
					el.textContent = 'нет правок';
					el.classList.remove('has-dirty');
				} else {
					el.textContent = `несохр.: ${n}`;
					el.classList.add('has-dirty');
				}
			}

			// ====================================================
			// LIVE REFRESH — реконсиляция списка постов с GitHub
			// build-time снэпшот all-posts-tags.json устаревает между деплоями:
			// новые посты не видны, переименованные имеют stale slug (→ 404),
			// удалённые 404'ят. Тянем актуальный git-tree и сверяемся.
			// ====================================================
			let _refreshing = false;
			let _lastRefreshTs = 0;

			function slugFromBlogPath(path) {
				// 'src/content/blog/foo-bar-457.md' → 'foo-bar-457'
				const m = path.match(/^src\/content\/blog\/(.+)\.md$/);
				return m ? m[1] : null;
			}
			function fmtTime(d) {
				const pad = (x) => String(x).padStart(2, '0');
				return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
			}
			function setRefreshStatus(msg, cls) {
				const el = $('refresh-status');
				if (!el) return;
				el.textContent = msg || '';
				el.className = 'muted' + (cls ? ' ' + cls : '');
			}

			/* Тянет git-tree один раз (1 GET), фильтрует src/content/blog/*.md,
			   реконсилирует POSTS:
			     • удалённые на сервере посты выкидываем,
			     • новые добавляем плейсхолдером (теги подтянутся лениво при раскрытии),
			     • существующие — снимаем флаг stale.
			   Теги существующих НЕ перегружаем здесь (это N GET'ов) — они и так
			   подтягиваются по refreshLiveTags() при раскрытии конкретного поста. */
			async function refreshListFromGitHub(opts) {
				opts = opts || {};
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) {
					if (!opts.auto) setRefreshStatus('нет PAT — нечем авторизоваться', 'err');
					return;
				}
				if (_refreshing) return;
				_refreshing = true;
				const btn = $('refresh-list');
				if (btn) btn.disabled = true;
				setRefreshStatus('синхронизирую с GitHub…', 'syncing');
				try {
					const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1&_=` + Date.now();
					const r = await fetch(url, {
						headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github+json' },
						cache: 'no-store',
					});
					if (!r.ok) {
						let detail = '';
						if (r.status === 401 || r.status === 403) detail = 'PAT истёк или нет доступа';
						else if (r.status === 404) detail = 'репо/ветка не найдены';
						else detail = 'статус ' + r.status;
						setRefreshStatus('не обновил: ' + detail, 'err');
						return;
					}
					const data = await r.json();
					const tree = Array.isArray(data.tree) ? data.tree : [];
					// На огромных репо git-tree может прийти обрезанным (truncated) —
					// тогда liveSlugs неполные, и удалять «отсутствующие» посты опасно.
					const truncated = data.truncated === true;
					// Живые slug'и блог-постов
					const liveSlugs = new Set();
					for (const node of tree) {
						if (node.type !== 'blob') continue;
						const slug = slugFromBlogPath(node.path || '');
						if (slug) liveSlugs.add(slug);
					}
					if (liveSlugs.size === 0) {
						setRefreshStatus('GitHub вернул пустой tree — список не тронут', 'err');
						return;
					}

					const bySlug = new Map(POSTS.map((p) => [p.slug, p]));
					let added = 0, removed = 0, unstaled = 0;

					// 1) Новые посты (есть на сервере, нет в снэпшоте) → плейсхолдеры
					for (const slug of liveSlugs) {
						if (bySlug.has(slug)) continue;
						const np = {
							slug,
							title: slug,            // настоящий title подтянем при раскрытии
							pubDate: '',
							tags: [],
							_orig: [],
							_tags: [],
							_saveStatus: null,
							_saveMsg: '',
							_expanded: false,
							_selected: false,
							_stale: false,
							_isNew: true,
							_tagsLoaded: false,     // лениво при раскрытии
						};
						POSTS.push(np);
						bySlug.set(slug, np);
						added++;
					}

					// 2) Удалённые на сервере → выкидываем (но НЕ выкидываем dirty —
					//    их пометим stale, чтобы юзер не потерял несохранённую правку).
					//    При truncated tree удаление НЕ делаем (список неполный).
					if (!truncated) {
						const keep = [];
						for (const p of POSTS) {
							if (liveSlugs.has(p.slug)) {
								if (p._stale) { p._stale = false; unstaled++; }
								keep.push(p);
							} else if (isDirty(p)) {
								// несохранённые правки на удалённый файл — не теряем, метим stale
								p._stale = true;
								keep.push(p);
							} else {
								removed++;
							}
						}
						POSTS = keep;
					}
					POSTS.sort((a, b) => (b.pubDate || '').localeCompare(a.pubDate || ''));

					_lastRefreshTs = Date.now();
					ensureDatalist();
					renderActiveTab();

					const parts = [];
					if (added) parts.push(`+${added} нов.`);
					if (removed) parts.push(`−${removed} удал.`);
					if (unstaled) parts.push(`${unstaled} восстановл.`);
					if (truncated) parts.push('tree обрезан, удал. пропущены');
					const summary = parts.length ? ' (' + parts.join(', ') + ')' : ' (без изменений)';
					setRefreshStatus('обновлено: ' + fmtTime(new Date(_lastRefreshTs)) + summary, '');
				} catch (e) {
					setRefreshStatus('не обновил: нет сети?', 'err');
				} finally {
					_refreshing = false;
					if (btn) btn.disabled = false;
				}
			}

			// ====================================================
			// datalist (autocomplete для тегов)
			// ====================================================
			function ensureDatalist() {
				let dl = document.getElementById('all-tags-datalist');
				if (!dl) {
					dl = document.createElement('datalist');
					dl.id = 'all-tags-datalist';
					document.body.appendChild(dl);
				}
				dl.replaceChildren();
				for (const t of allTags()) {
					const opt = document.createElement('option');
					opt.value = t;
					dl.appendChild(opt);
				}
				if (typeof invalidateTopTagsCache === 'function') invalidateTopTagsCache();
			}

			// ====================================================
			// tabs
			// ====================================================
			let activeTab = 'posts';
			document.querySelectorAll('.tab').forEach((btn) => {
				btn.addEventListener('click', () => {
					document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
					btn.classList.add('active');
					activeTab = btn.dataset.tab;
					$('tab-posts').classList.toggle('hidden', activeTab !== 'posts');
					$('tab-tags').classList.toggle('hidden', activeTab !== 'tags');
					renderActiveTab();
				});
			});
			function renderActiveTab() {
				if (activeTab === 'posts') renderPosts();
				else renderTags();
				updateDirtyBadge();
				if (typeof updateBulkBar === 'function') updateBulkBar();
			}

			// ====================================================
			// POSTS TAB
			// ====================================================
			let postsSearch = '';
			let postsFilter = 'all';   // 'all' | 'none' | 'few' | 'many'
			$('search-posts').addEventListener('input', (e) => {
				postsSearch = e.target.value.trim().toLowerCase();
				renderPosts();
			});
			document.querySelectorAll('#filter-chips button').forEach((btn) => {
				btn.addEventListener('click', () => {
					document.querySelectorAll('#filter-chips button').forEach((b) => b.classList.remove('active'));
					btn.classList.add('active');
					postsFilter = btn.dataset.filter;
					renderPosts();
				});
			});
			function postMatches(p, q) {
				if (!q) return true;
				if ((p.slug || '').toLowerCase().includes(q)) return true;
				if ((p.title || '').toLowerCase().includes(q)) return true;
				if (p._tags.some((t) => t.toLowerCase().includes(q))) return true;
				return false;
			}
			function postPassesFilter(p, f) {
				const n = p._tags.length;
				if (f === 'all') return true;
				if (f === 'none') return n === 0;
				if (f === 'few') return n >= 1 && n <= 2;
				if (f === 'many') return n >= 5;
				return true;
			}
			function renderPosts() {
				const root = $('posts-list');
				const visible = POSTS.filter((p) =>
					postMatches(p, postsSearch) && postPassesFilter(p, postsFilter)
				);
				if (!visible.length) {
					const empty = document.createElement('p');
					empty.className = 'muted';
					empty.textContent = 'ничего не нашёл';
					root.replaceChildren(empty);
					updateBulkBar();
					return;
				}
				const frag = document.createDocumentFragment();
				for (const p of visible) frag.appendChild(renderPostNode(p));
				root.replaceChildren(frag);
				updateBulkBar();
			}

			// ====================================================
			// Multi-select & bulk bar
			// ====================================================
			function selectedPosts() { return POSTS.filter((p) => p._selected); }
			function updateBulkBar() {
				const sel = selectedPosts();
				const bar = $('bulk-bar');
				if (sel.length === 0 || activeTab !== 'posts') {
					bar.classList.add('hidden');
					return;
				}
				bar.classList.remove('hidden');
				$('bulk-count').textContent = `выбрано: ${sel.length}`;
			}
			$('bulk-clear').addEventListener('click', () => {
				POSTS.forEach((p) => { p._selected = false; });
				$('bulk-tag-input').value = '';
				$('bulk-status').textContent = '';
				$('bulk-status').className = 'bulk-status';
				renderPosts();
			});
			async function bulkApplyTag() {
				const tag = $('bulk-tag-input').value.trim();
				if (!tag) { $('bulk-status').textContent = 'пусто'; $('bulk-status').className = 'bulk-status err'; return; }
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) { alert('PAT нет в localStorage'); return; }
				const sel = selectedPosts();
				const targets = sel.filter((p) => !p._tags.includes(tag));
				if (!targets.length) {
					$('bulk-status').textContent = 'у всех уже есть';
					$('bulk-status').className = 'bulk-status';
					return;
				}
				$('bulk-apply').disabled = true;
				$('bulk-clear').disabled = true;
				let ok = 0;
				const fails = [];
				for (let i = 0; i < targets.length; i++) {
					const p = targets[i];
					$('bulk-status').textContent = `${i + 1}/${targets.length}…`;
					$('bulk-status').className = 'bulk-status';
					p._tags.push(tag);
					await savePost(p, pat, { silent: true });
					if (p._saveStatus === 'ok') ok++;
					else {
						fails.push({ slug: p.slug, title: p.title, msg: p._saveMsg || 'ошибка' });
						// rollback на ошибке
						p._tags = p._tags.filter((t) => t !== tag);
					}
				}
				$('bulk-apply').disabled = false;
				$('bulk-clear').disabled = false;
				$('bulk-status').textContent = fails.length === 0 ? `${ok}/${targets.length} ✓` : `${ok} ок, ${fails.length} err`;
				$('bulk-status').className = 'bulk-status ' + (fails.length === 0 ? 'ok' : 'err');
				$('bulk-status').title = fails.length ? fails.map((f) => `${f.slug}: ${f.msg}`).join('\n') : '';
				ensureDatalist();
				if (fails.length === 0) {
					$('bulk-tag-input').value = '';
				}
				renderPosts();
			}
			$('bulk-apply').addEventListener('click', bulkApplyTag);
			$('bulk-tag-input').addEventListener('keydown', (e) => {
				if (e.key === 'Enter') { e.preventDefault(); bulkApplyTag(); }
			});

			function renderPostNode(p) {
				const el = document.createElement('section');
				el.className = 'post';
				if (isDirty(p)) el.classList.add('dirty');
				if (p._expanded) el.classList.add('expanded');
				if (p._stale) el.classList.add('stale');
				el.dataset.slug = p.slug;

				// Head row: checkbox + body
				const head = document.createElement('div');
				head.className = 'post-head';

				const cbWrap = document.createElement('div');
				cbWrap.className = 'post-cb-wrap';
				const cb = document.createElement('input');
				cb.type = 'checkbox';
				cb.className = 'post-cb';
				cb.checked = !!p._selected;
				cb.title = 'выбрать для bulk-операций';
				cb.addEventListener('click', (e) => e.stopPropagation());
				cb.addEventListener('change', (e) => {
					p._selected = cb.checked;
					// если включили чекбокс — закрываем editor (избегаем confusion)
					if (cb.checked && p._expanded) {
						p._expanded = false;
					}
					renderPosts();
				});
				cbWrap.appendChild(cb);
				head.appendChild(cbWrap);

				const body = document.createElement('div');
				body.className = 'post-body';

				const title = document.createElement('div');
				title.className = 'post-title';
				title.textContent = p.title || p.slug;
				if (p._isNew) {
					const nb = document.createElement('span');
					nb.className = 'post-badge-new';
					nb.textContent = 'нов.';
					nb.title = 'появился на сервере после последнего деплоя';
					title.appendChild(document.createTextNode(' '));
					title.appendChild(nb);
				}
				body.appendChild(title);

				const meta = document.createElement('div');
				meta.className = 'post-meta';
				const dt = document.createElement('span');
				dt.textContent = p.pubDate || '';
				meta.appendChild(dt);
				const link = document.createElement('a');
				link.href = `${base}/blog/${p.slug}/`;
				link.target = '_blank';
				link.rel = 'noopener';
				link.textContent = p.slug;
				link.addEventListener('click', (e) => e.stopPropagation());
				meta.appendChild(link);
				if (!p._tagsLoaded && !p._expanded) {
					const lz = document.createElement('span');
					lz.className = 'post-badge-lazy';
					lz.textContent = 'теги загрузятся при открытии';
					meta.appendChild(lz);
				}
				appendSaveStatus(meta, p);
				body.appendChild(meta);

				if (!p._expanded) {
					// compact chips
					const chips = document.createElement('div');
					chips.className = 'chips';
					p._tags.forEach((tag) => {
						const c = document.createElement('span');
						c.className = 'chip compact';
						c.textContent = tag;
						chips.appendChild(c);
					});
					body.appendChild(chips);
				} else {
					// expanded editor
					const editor = document.createElement('div');
					editor.className = 'editor';
					const chips = document.createElement('div');
					chips.className = 'chips';
					p._tags.forEach((tag, idx) => chips.appendChild(renderChip(p, tag, idx)));
					const input = document.createElement('input');
					input.type = 'text';
					input.className = 'add-input';
					input.placeholder = '+ тег';
					input.setAttribute('list', 'all-tags-datalist');
					input.addEventListener('click', (e) => e.stopPropagation());
					input.addEventListener('keydown', (e) => {
						if (e.key === 'Enter') {
							e.preventDefault();
							const v = input.value.trim();
							if (!v) return;
							if (p._tags.includes(v)) { input.value = ''; return; }
							p._tags.push(v);
							input.value = '';
							rerenderPost(p, el, true);
						} else if (e.key === 'Escape') {
							input.value = '';
							input.blur();
						}
					});
					chips.appendChild(input);
					editor.appendChild(chips);

					// quick-add bar
					const topTags = topCommonTags(10);
					if (topTags.length) {
						const qa = document.createElement('div');
						qa.className = 'quick-add-bar';
						const lbl = document.createElement('span');
						lbl.className = 'qa-label';
						lbl.textContent = 'быстро:';
						qa.appendChild(lbl);
						topTags.forEach((t) => {
							const b = document.createElement('button');
							b.type = 'button';
							b.className = 'quick-add-chip';
							b.textContent = t;
							if (p._tags.includes(t)) b.classList.add('dim');
							b.addEventListener('click', (e) => {
								e.stopPropagation();
								if (p._tags.includes(t)) return;
								p._tags.push(t);
								rerenderPost(p, el);
							});
							qa.appendChild(b);
						});
						editor.appendChild(qa);
					}

					const actions = document.createElement('div');
					actions.className = 'editor-actions';
					const saveBtn = document.createElement('button');
					saveBtn.className = 'primary';
					saveBtn.type = 'button';
					saveBtn.textContent = 'сохранить';
					saveBtn.disabled = !isDirty(p);
					saveBtn.addEventListener('click', async (e) => {
						e.stopPropagation();
						const pat = localStorage.getItem(LS_PAT_KEY);
						if (!pat) { alert('PAT нет в localStorage'); return; }
						await savePost(p, pat);
						ensureDatalist();
					});
					const cancelBtn = document.createElement('button');
					cancelBtn.className = 'ghost';
					cancelBtn.type = 'button';
					cancelBtn.textContent = 'отмена';
					cancelBtn.disabled = !isDirty(p);
					cancelBtn.addEventListener('click', (e) => {
						e.stopPropagation();
						p._tags = p._orig.slice();
						p._saveStatus = null;
						rerenderPost(p, el);
					});
					actions.appendChild(saveBtn);
					actions.appendChild(cancelBtn);
					editor.appendChild(actions);
					body.appendChild(editor);
				}

				head.appendChild(body);
				el.appendChild(head);

				// клик по карточке — toggle expanded (другие схлопываются).
				// Если post уже selected — снимаем selection вместо expand, чтобы избежать confusion.
				el.addEventListener('click', (e) => {
					if (e.target.closest('button, input, a, label')) return;
					if (p._expanded) {
						p._expanded = false;
						rerenderPost(p, el);
					} else {
						// auto-uncheck on expand (если выбран — снимаем)
						if (p._selected) p._selected = false;
						POSTS.forEach((other) => { if (other !== p) other._expanded = false; });
						p._expanded = true;
						renderPosts();
						// Live-refresh тегов из репо (один раз): build-time снэпшот
						// мог устареть (LLM-теги добавились после), показываем реальные.
						refreshLiveTags(p);
					}
				});

				return el;
			}

			// top-N самые частые теги (для quick-add bar)
			let _topTagsCache = null;
			let _topTagsCacheKey = '';
			function topCommonTags(n) {
				const counts = tagCounts();
				const key = counts.size + ':' + n;
				if (_topTagsCache && _topTagsCacheKey === key) return _topTagsCache;
				const arr = Array.from(counts.entries())
					.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ru'))
					.slice(0, n)
					.map(([t]) => t);
				_topTagsCache = arr;
				_topTagsCacheKey = key;
				return arr;
			}
			function invalidateTopTagsCache() { _topTagsCache = null; _topTagsCacheKey = ''; }

			function appendSaveStatus(meta, p) {
				if (p._saveStatus === 'ok') {
					const s = document.createElement('span');
					s.className = 'save-status ok';
					s.textContent = '✓ сохранено';
					meta.appendChild(s);
				} else if (p._saveStatus === 'err') {
					const isAuth = p._saveCode === 'auth' || isPatAuthErr(p._saveMsg);
					const s = document.createElement('span');
					s.className = 'save-status err';
					s.textContent = '✗ ' + (p._saveMsg || 'ошибка');
					s.title = p._saveMsg || '';
					meta.appendChild(s);
					if (isAuth) {
						const r = document.createElement('button');
						r.type = 'button';
						r.className = 'pat-refresh-inline';
						r.textContent = 'обновить PAT';
						r.addEventListener('click', (e) => {
							e.stopPropagation();
							localStorage.removeItem(LS_PAT_KEY);
							showPatGate();
						});
						meta.appendChild(r);
					}
				} else if (p._saveStatus === 'saving') {
					const s = document.createElement('span');
					s.className = 'save-status saving';
					s.textContent = '… сохраняю';
					meta.appendChild(s);
				}
			}

			function renderChip(p, tag, idx) {
				const chip = document.createElement('span');
				chip.className = 'chip';
				chip.textContent = tag;
				const btn = document.createElement('button');
				btn.type = 'button';
				btn.title = 'убрать';
				btn.textContent = '×';
				btn.addEventListener('click', (e) => {
					e.stopPropagation();
					p._tags.splice(idx, 1);
					rerenderPost(p, chip.closest('.post'), true);
				});
				chip.appendChild(btn);
				return chip;
			}

			function rerenderPost(p, oldEl, keepFocus) {
				const fresh = renderPostNode(p);
				oldEl.replaceWith(fresh);
				updateDirtyBadge();
				if (keepFocus) {
					const inp = fresh.querySelector('.add-input');
					if (inp) inp.focus();
				}
			}

			function rerenderPostInPlace(p) {
				const node = document.querySelector(`#posts-list .post[data-slug="${cssEscape(p.slug)}"]`);
				if (node) rerenderPost(p, node);
				else updateDirtyBadge();
			}
			function cssEscape(s) {
				if (window.CSS && CSS.escape) return CSS.escape(s);
				return String(s).replace(/[^a-zA-Z0-9_-]/g, (c) => '\\' + c);
			}

			// ====================================================
			// TAGS TAB
			// ====================================================
			let tagsSearch = '';
			let expandedTag = null;       // string | null
			let addOthersOpen = false;    // collapsible подсекция
			let addOthersFilter = '';
			let renameMode = false;       // true if rename input active
			let mergeMode = false;        // true if merge input active

			$('search-tags').addEventListener('input', (e) => {
				tagsSearch = e.target.value.trim().toLowerCase();
				renderTags();
			});

			function renderTags() {
				const root = $('tags-list');
				const counts = tagCounts();
				let entries = Array.from(counts.entries());
				if (tagsSearch) entries = entries.filter(([t]) => t.toLowerCase().includes(tagsSearch));
				entries.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ru'));

				if (!entries.length) {
					const empty = document.createElement('p');
					empty.className = 'muted';
					empty.textContent = 'тегов не найдено';
					root.replaceChildren(empty);
					return;
				}

				const frag = document.createDocumentFragment();
				for (const [tag, count] of entries) frag.appendChild(renderTagRow(tag, count));
				root.replaceChildren(frag);
			}

			function renderTagRow(tag, count) {
				const row = document.createElement('section');
				row.className = 'tag-row';
				row.dataset.tag = tag;
				const isExpanded = expandedTag === tag;
				if (isExpanded) row.classList.add('expanded');

				const head = document.createElement('div');
				head.className = 'tag-row-head';
				const name = document.createElement('div');
				name.className = 'tag-name';
				name.innerHTML = `<span class="chevron">›</span>`;
				const tspan = document.createElement('span');
				tspan.textContent = tag;
				name.appendChild(tspan);
				head.appendChild(name);
				const cnt = document.createElement('div');
				cnt.className = 'tag-count';
				cnt.textContent = `× ${count} ${plural(count, 'пост', 'поста', 'постов')}`;
				head.appendChild(cnt);
				row.appendChild(head);

				head.addEventListener('click', () => {
					if (isExpanded) {
						expandedTag = null;
					} else {
						expandedTag = tag;
						renameMode = false;
						mergeMode = false;
						addOthersOpen = false;
						addOthersFilter = '';
					}
					renderTags();
				});

				if (isExpanded) {
					row.appendChild(renderTagPanel(tag, count));
				}

				return row;
			}

			function plural(n, one, few, many) {
				const mod10 = n % 10;
				const mod100 = n % 100;
				if (mod10 === 1 && mod100 !== 11) return one;
				if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
				return many;
			}

			function renderTagPanel(tag, count) {
				const panel = document.createElement('div');
				panel.className = 'tag-panel';
				panel.addEventListener('click', (e) => e.stopPropagation());

				// Actions
				const actions = document.createElement('div');
				actions.className = 'tag-actions';
				const renameBtn = document.createElement('button');
				renameBtn.className = 'ghost';
				renameBtn.type = 'button';
				renameBtn.textContent = '✎ переименовать';
				renameBtn.addEventListener('click', () => {
					renameMode = true;
					mergeMode = false;
					renderTags();
				});
				const mergeBtn = document.createElement('button');
				mergeBtn.className = 'ghost';
				mergeBtn.type = 'button';
				mergeBtn.textContent = '⇄ слить с другим';
				mergeBtn.addEventListener('click', () => {
					mergeMode = true;
					renameMode = false;
					renderTags();
				});
				const deleteBtn = document.createElement('button');
				deleteBtn.className = 'ghost danger';
				deleteBtn.type = 'button';
				deleteBtn.textContent = '🗑 удалить везде';
				deleteBtn.addEventListener('click', () => deleteTagEverywhere(tag, count));
				actions.appendChild(renameBtn);
				actions.appendChild(mergeBtn);
				actions.appendChild(deleteBtn);
				panel.appendChild(actions);

				// Rename form (inline)
				if (renameMode) {
					const form = document.createElement('div');
					form.className = 'rename-form';
					const inp = document.createElement('input');
					inp.type = 'text';
					inp.value = tag;
					inp.placeholder = 'новое имя';
					const ok = document.createElement('button');
					ok.className = 'primary';
					ok.type = 'button';
					ok.textContent = 'переименовать';
					const cancel = document.createElement('button');
					cancel.className = 'ghost';
					cancel.type = 'button';
					cancel.textContent = 'отмена';
					const submit = () => {
						const newName = inp.value.trim();
						if (!newName || newName === tag) { renameMode = false; renderTags(); return; }
						renameTagEverywhere(tag, newName, count);
					};
					ok.addEventListener('click', submit);
					inp.addEventListener('keydown', (e) => {
						if (e.key === 'Enter') { e.preventDefault(); submit(); }
						else if (e.key === 'Escape') { renameMode = false; renderTags(); }
					});
					cancel.addEventListener('click', () => { renameMode = false; renderTags(); });
					form.appendChild(inp);
					form.appendChild(ok);
					form.appendChild(cancel);
					panel.appendChild(form);
					setTimeout(() => { inp.focus(); inp.select(); }, 30);
				}

				// Merge form (inline)
				if (mergeMode) {
					const form = document.createElement('div');
					form.className = 'rename-form';
					const lbl = document.createElement('span');
					lbl.className = 'muted';
					lbl.textContent = 'слить в тег:';
					lbl.style.flex = '0 0 auto';
					const inp = document.createElement('input');
					inp.type = 'text';
					inp.placeholder = 'тег-приёмник';
					inp.setAttribute('list', 'all-tags-datalist');
					const ok = document.createElement('button');
					ok.className = 'primary';
					ok.type = 'button';
					ok.textContent = 'слить';
					const cancel = document.createElement('button');
					cancel.className = 'ghost';
					cancel.type = 'button';
					cancel.textContent = 'отмена';
					const submit = () => {
						const target = inp.value.trim();
						if (!target || target === tag) { mergeMode = false; renderTags(); return; }
						mergeTagInto(tag, target);
					};
					ok.addEventListener('click', submit);
					inp.addEventListener('keydown', (e) => {
						if (e.key === 'Enter') { e.preventDefault(); submit(); }
						else if (e.key === 'Escape') { mergeMode = false; renderTags(); }
					});
					cancel.addEventListener('click', () => { mergeMode = false; renderTags(); });
					form.appendChild(lbl);
					form.appendChild(inp);
					form.appendChild(ok);
					form.appendChild(cancel);
					panel.appendChild(form);
					setTimeout(() => { inp.focus(); }, 30);
				}

				// Progress
				const prog = document.createElement('p');
				prog.className = 'batch-progress';
				prog.id = `tag-progress-${cssEscape(tag)}`;
				panel.appendChild(prog);

				// Section: "в этих постах"
				const sect1 = document.createElement('div');
				sect1.className = 'tag-section';
				const h1 = document.createElement('h4');
				h1.textContent = `в этих постах (${count})`;
				sect1.appendChild(h1);
				const hasTag = POSTS.filter((p) => p._tags.includes(tag));
				hasTag.sort((a, b) => (b.pubDate || '').localeCompare(a.pubDate || ''));
				const list1 = document.createElement('div');
				hasTag.forEach((p) => list1.appendChild(renderMiniPost(p, tag, 'remove')));
				sect1.appendChild(list1);
				panel.appendChild(sect1);

				// Section: "+ добавить в другие посты" (collapsible)
				const sect2 = document.createElement('div');
				sect2.className = 'tag-section';
				const h2 = document.createElement('h4');
				h2.className = 'clickable';
				const without = POSTS.filter((p) => !p._tags.includes(tag));
				h2.innerHTML = `+ добавить в другие посты (${without.length})<span class="toggle-arrow">${addOthersOpen ? '▾' : '▸'}</span>`;
				h2.addEventListener('click', () => {
					addOthersOpen = !addOthersOpen;
					renderTags();
				});
				sect2.appendChild(h2);
				if (addOthersOpen) {
					const sf = document.createElement('input');
					sf.className = 'subfilter';
					sf.type = 'search';
					sf.placeholder = 'фильтр постов…';
					sf.value = addOthersFilter;
					sf.addEventListener('input', (e) => {
						addOthersFilter = e.target.value.trim().toLowerCase();
						// частичный rerender: список — детям, h2 счётчик не меняется
						const list = sect2.querySelector('.others-list');
						if (list) {
							list.replaceChildren(...renderOthersList(tag));
						}
					});
					sect2.appendChild(sf);
					const list2 = document.createElement('div');
					list2.className = 'others-list';
					renderOthersList(tag).forEach((n) => list2.appendChild(n));
					sect2.appendChild(list2);
				}
				panel.appendChild(sect2);

				return panel;
			}

			function renderOthersList(tag) {
				let posts = POSTS.filter((p) => !p._tags.includes(tag));
				if (addOthersFilter) {
					posts = posts.filter((p) =>
						(p.title || '').toLowerCase().includes(addOthersFilter) ||
						(p.slug || '').toLowerCase().includes(addOthersFilter)
					);
				}
				posts.sort((a, b) => (b.pubDate || '').localeCompare(a.pubDate || ''));
				posts = posts.slice(0, 200);
				return posts.map((p) => renderMiniPost(p, tag, 'add'));
			}

			function renderMiniPost(p, tag, mode) {
				const row = document.createElement('div');
				row.className = 'mini-post';
				const titleWrap = document.createElement('div');
				titleWrap.className = 'mini-title';
				const a = document.createElement('a');
				a.href = `${base}/blog/${p.slug}/`;
				a.target = '_blank';
				a.rel = 'noopener';
				a.textContent = p.title || p.slug;
				titleWrap.appendChild(a);
				row.appendChild(titleWrap);
				const dt = document.createElement('span');
				dt.className = 'mini-date';
				dt.textContent = p.pubDate || '';
				row.appendChild(dt);

				if (p._saveStatus === 'saving') {
					const s = document.createElement('span');
					s.className = 'save-status saving';
					s.textContent = '…';
					row.appendChild(s);
				} else if (p._saveStatus === 'ok') {
					const s = document.createElement('span');
					s.className = 'save-status ok';
					s.textContent = '✓';
					row.appendChild(s);
				} else if (p._saveStatus === 'err') {
					const s = document.createElement('span');
					s.className = 'save-status err';
					s.textContent = '✗';
					s.title = p._saveMsg || '';
					row.appendChild(s);
				}

				const btn = document.createElement('button');
				btn.type = 'button';
				if (mode === 'remove') {
					btn.className = 'icon';
					btn.title = 'убрать тег у этого поста';
					btn.textContent = '×';
					btn.addEventListener('click', async (e) => {
						e.stopPropagation();
						const pat = localStorage.getItem(LS_PAT_KEY);
						if (!pat) { alert('PAT нет в localStorage'); return; }
						const idx = p._tags.indexOf(tag);
						if (idx < 0) return;
						p._tags.splice(idx, 1);
						await savePost(p, pat, { silent: true });
						if (p._saveStatus === 'err') {
							// rollback
							p._tags.splice(idx, 0, tag);
						}
						ensureDatalist();
						renderTags();
					});
				} else {
					btn.className = 'ghost';
					btn.textContent = '+ добавить';
					btn.addEventListener('click', async (e) => {
						e.stopPropagation();
						const pat = localStorage.getItem(LS_PAT_KEY);
						if (!pat) { alert('PAT нет в localStorage'); return; }
						if (p._tags.includes(tag)) return;
						p._tags.push(tag);
						await savePost(p, pat, { silent: true });
						if (p._saveStatus === 'err') {
							p._tags = p._tags.filter((t) => t !== tag);
						}
						ensureDatalist();
						renderTags();
					});
				}
				row.appendChild(btn);
				return row;
			}

			// ====================================================
			// Confirm modal с превью затронутых постов
			// ====================================================
			function confirmModal(title, posts) {
				return new Promise((resolve) => {
					const root = $('modal-root');
					const overlay = document.createElement('div');
					overlay.className = 'modal-overlay';
					const modal = document.createElement('div');
					modal.className = 'modal';

					const h = document.createElement('h3');
					h.textContent = title;
					modal.appendChild(h);

					const list = document.createElement('div');
					list.className = 'modal-list';
					const max = 15;
					const shown = posts.slice(0, max);
					shown.forEach((p) => {
						const row = document.createElement('div');
						row.className = 'mtitle';
						row.textContent = p.title || p.slug;
						list.appendChild(row);
					});
					if (posts.length > max) {
						const more = document.createElement('div');
						more.className = 'more';
						more.textContent = `…и ещё ${posts.length - max}`;
						list.appendChild(more);
					}
					if (!posts.length) {
						const empty = document.createElement('div');
						empty.className = 'more';
						empty.textContent = '(нет затронутых постов)';
						list.appendChild(empty);
					}
					modal.appendChild(list);

					const acts = document.createElement('div');
					acts.className = 'modal-actions';
					const cancel = document.createElement('button');
					cancel.className = 'ghost';
					cancel.type = 'button';
					cancel.textContent = 'отмена';
					const ok = document.createElement('button');
					ok.className = 'primary';
					ok.type = 'button';
					ok.textContent = 'подтвердить';
					const cleanup = (val) => {
						overlay.remove();
						document.removeEventListener('keydown', onKey);
						resolve(val);
					};
					const onKey = (e) => {
						if (e.key === 'Escape') cleanup(false);
						if (e.key === 'Enter') cleanup(true);
					};
					cancel.addEventListener('click', () => cleanup(false));
					ok.addEventListener('click', () => cleanup(true));
					overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(false); });
					document.addEventListener('keydown', onKey);
					acts.appendChild(cancel);
					acts.appendChild(ok);
					modal.appendChild(acts);
					overlay.appendChild(modal);
					root.appendChild(overlay);
					setTimeout(() => ok.focus(), 30);
				});
			}

			// Если в текстовом сообщении ошибки есть 401/403 — это auth-проблема с PAT
			function isPatAuthErr(msg) {
				return /\b(401|403)\b/.test(msg || '');
			}

			// Человекочитаемый итог batch-операции: «обновлено N, ошибок K: <пост> — <причина>»
			function batchSummary(ok, fails, verb) {
				verb = verb || 'обновлено';
				if (!fails.length) return `${verb} ${ok} ✓`;
				const first = fails.slice(0, 2)
					.map((f) => `${(f.title || f.slug || '').slice(0, 28)} — ${f.msg}`)
					.join('; ');
				const more = fails.length > 2 ? ` (+ещё ${fails.length - 2})` : '';
				return `${verb} ${ok}, ошибок ${fails.length}: ${first}${more}`;
			}

			// ====================================================
			// Batch operations (rename / delete tag everywhere / merge)
			// ====================================================
			async function renameTagEverywhere(oldTag, newTag, count) {
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) { alert('PAT нет в localStorage'); return; }
				const affected = POSTS.filter((p) => p._tags.includes(oldTag));
				const confirmed = await confirmModal(
					`Переименовать тег '${oldTag}' → '${newTag}' в ${affected.length} ${plural(affected.length, 'посте', 'постах', 'постах')}`,
					affected,
				);
				if (!confirmed) return;
				const prog = document.getElementById(`tag-progress-${cssEscape(oldTag)}`);
				let ok = 0;
				const fails = [];
				for (let i = 0; i < affected.length; i++) {
					const p = affected[i];
					if (prog) prog.textContent = `обновляю ${i + 1}/${affected.length}…`;
					// заменяем
					p._tags = p._tags.map((t) => (t === oldTag ? newTag : t));
					// дедуп (если newTag уже был)
					p._tags = Array.from(new Set(p._tags));
					await savePost(p, pat, { silent: true });
					if (p._saveStatus === 'ok') ok++;
					else fails.push({ slug: p.slug, title: p.title, msg: p._saveMsg || 'ошибка' });
				}
				renameMode = false;
				// expandedTag → новый, если все ок; иначе остаёмся на старом
				if (fails.length === 0) expandedTag = newTag;
				ensureDatalist();
				renderTags();
				const finalProg = document.getElementById(`tag-progress-${cssEscape(fails.length === 0 ? newTag : oldTag)}`);
				if (finalProg) {
					finalProg.textContent = batchSummary(ok, fails, 'переименовано');
					finalProg.className = 'batch-progress ' + (fails.length === 0 ? 'ok' : 'err');
				}
			}

			async function deleteTagEverywhere(tag, count) {
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) { alert('PAT нет в localStorage'); return; }
				const affected = POSTS.filter((p) => p._tags.includes(tag));
				const confirmed = await confirmModal(
					`Удалить тег '${tag}' из ${affected.length} ${plural(affected.length, 'поста', 'постов', 'постов')}`,
					affected,
				);
				if (!confirmed) return;
				const prog = document.getElementById(`tag-progress-${cssEscape(tag)}`);
				let ok = 0;
				const fails = [];
				for (let i = 0; i < affected.length; i++) {
					const p = affected[i];
					if (prog) prog.textContent = `удаляю ${i + 1}/${affected.length}…`;
					p._tags = p._tags.filter((t) => t !== tag);
					await savePost(p, pat, { silent: true });
					if (p._saveStatus === 'ok') ok++;
					else fails.push({ slug: p.slug, title: p.title, msg: p._saveMsg || 'ошибка' });
				}
				if (fails.length === 0) expandedTag = null;
				ensureDatalist();
				renderTags();
				// если тег полностью пропал из POSTS, panel'а больше нет — пишем в верхний статус
				$('status-tags').textContent = fails.length === 0
					? `тег '${tag}' удалён из ${ok} постов ✓`
					: batchSummary(ok, fails, `тег '${tag}': удалено`);
			}

			async function mergeTagInto(fromTag, toTag) {
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) { alert('PAT нет в localStorage'); return; }
				if (!toTag || toTag === fromTag) return;
				const affected = POSTS.filter((p) => p._tags.includes(fromTag));
				const confirmed = await confirmModal(
					`Слить тег '${fromTag}' → '${toTag}' в ${affected.length} ${plural(affected.length, 'посте', 'постах', 'постах')}`,
					affected,
				);
				if (!confirmed) return;
				const prog = document.getElementById(`tag-progress-${cssEscape(fromTag)}`);
				let ok = 0;
				const fails = [];
				for (let i = 0; i < affected.length; i++) {
					const p = affected[i];
					if (prog) prog.textContent = `сливаю ${i + 1}/${affected.length}…`;
					if (p._tags.includes(toTag)) {
						p._tags = p._tags.filter((t) => t !== fromTag);
					} else {
						p._tags = p._tags.map((t) => (t === fromTag ? toTag : t));
					}
					p._tags = Array.from(new Set(p._tags));
					await savePost(p, pat, { silent: true });
					if (p._saveStatus === 'ok') ok++;
					else fails.push({ slug: p.slug, title: p.title, msg: p._saveMsg || 'ошибка' });
				}
				mergeMode = false;
				if (fails.length === 0) expandedTag = toTag;
				ensureDatalist();
				renderTags();
				const finalProg = document.getElementById(`tag-progress-${cssEscape(fails.length === 0 ? toTag : fromTag)}`);
				if (finalProg) {
					finalProg.textContent = fails.length === 0
						? `готово ✓ — слито в '${toTag}' (${ok} постов)`
						: batchSummary(ok, fails, `слито в '${toTag}'`);
					finalProg.className = 'batch-progress ' + (fails.length === 0 ? 'ok' : 'err');
				}
			}

			// ====================================================
			// GitHub Contents API — save single post
			// ====================================================
			function tagsToFrontmatterValue(tags) {
				return '[' + tags.map((t) => "'" + t.replace(/'/g, "''") + "'").join(', ') + ']';
			}
			function patchFrontmatterTags(md, newTags) {
				const fmMatch = md.match(/^---\r?\n([\s\S]*?)\r?\n---/);
				if (!fmMatch) return null;
				const fm = fmMatch[1];
				const newTagsLine = 'tags: ' + tagsToFrontmatterValue(newTags);
				let newFm;
				if (/^tags:\s*\[[^\]]*\]/m.test(fm)) {
					newFm = fm.replace(/^tags:\s*\[[^\]]*\]/m, newTagsLine);
				} else if (/^pubDate:.*$/m.test(fm)) {
					newFm = fm.replace(/^(pubDate:.*)$/m, '$1\n' + newTagsLine);
				} else {
					newFm = fm + '\n' + newTagsLine;
				}
				return md.replace(fmMatch[0], '---\n' + newFm + '\n---');
			}
			// UTF-8 safe base64 (русский, эмодзи)
			function utf8ToBase64(s) {
				const bytes = new TextEncoder().encode(s);
				let bin = '';
				for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
				return btoa(bin);
			}
			function base64ToUtf8(b64) {
				const bin = atob(b64.replace(/\s/g, ''));
				const bytes = new Uint8Array(bin.length);
				for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
				return new TextDecoder().decode(bytes);
			}

			/* Подтягивает АКТУАЛЬНЫЕ данные поста из репо при раскрытии (один раз
			   за сессию). build-time снэпшот all-posts-tags.json устаревает —
			   LLM-теггер дописывает теги после деплоя, новые посты появляются.
			   Для НОВЫХ постов (плейсхолдеров) подтягивает ещё title/pubDate.
			   Если юзер уже наредактировал (dirty) — теги не трогаем (но title
			   нового поста подтянуть можно). Тихий best-effort.
			   На 404 — метим пост stale (переименован/удалён на сервере). */
			async function refreshLiveTags(p) {
				if (p._refreshed && p._tagsLoaded) return;
				const pat = localStorage.getItem(LS_PAT_KEY);
				if (!pat) return;
				const wasNew = !p._tagsLoaded;
				p._refreshed = true;
				try {
					const path = 'src/content/blog/' + p.slug + '.md';
					const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}&_=` + Date.now(), {
						headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github+json' },
						cache: 'no-store',
					});
					if (r.status === 404) {
						// файл переименован/удалён — пост stale
						p._stale = true;
						p._tagsLoaded = true;
						if (p._expanded && activeTab === 'posts') {
							const el = document.querySelector(`#posts-list .post[data-slug="${cssEscape(p.slug)}"]`);
							if (el) rerenderPost(p, el);
						}
						return;
					}
					if (!r.ok) return;
					const data = await r.json();
					const md = base64ToUtf8(data.content);
					const live = parseTagsFromMd(md);
					let changed = false;
					// Теги: только если юзер не успел наредачить.
					if (!isDirty(p) && JSON.stringify(live) !== JSON.stringify(p._tags)) {
						p._tags = live.slice();
						p._orig = live.slice();
						changed = true;
					}
					// Для нового поста — подтягиваем человеческий title/pubDate.
					if (wasNew) {
						const t = parseFmField(md, 'title');
						const d = parseFmField(md, 'pubDate');
						if (t && p.title === p.slug) { p.title = t; changed = true; }
						if (d && !p.pubDate) { p.pubDate = d; changed = true; }
						if (!isDirty(p)) { p._orig = live.slice(); }
					}
					p._tagsLoaded = true;
					if (changed && p._expanded && activeTab === 'posts') {
						const el = document.querySelector(`#posts-list .post[data-slug="${cssEscape(p.slug)}"]`);
						if (el) rerenderPost(p, el);
					}
				} catch {}
			}

			/* Парсит текущие теги из frontmatter живого .md (формат tags: ['a','b']). */
			function parseTagsFromMd(md) {
				const fm = md.match(/^---\r?\n([\s\S]*?)\r?\n---/);
				if (!fm) return [];
				const line = fm[1].match(/^tags:\s*\[([^\]]*)\]/m);
				if (!line) return [];
				const inner = line[1].trim();
				if (!inner) return [];
				return inner.split(',').map((s) => s.trim().replace(/^['"]|['"]$/g, '')).filter(Boolean);
			}

			/* Достаёт скалярное поле frontmatter (title/pubDate) из живого .md.
			   Формат стабильный: single-quoted ('') либо без кавычек. */
			function parseFmField(md, field) {
				const fm = md.match(/^---\r?\n([\s\S]*?)\r?\n---/);
				if (!fm) return '';
				const re = new RegExp('^' + field + ":\\s*'((?:[^']|'')*)'", 'm');
				const q = fm[1].match(re);
				if (q) return q[1].replace(/''/g, "'");
				const bare = fm[1].match(new RegExp('^' + field + ':\\s*(.+?)\\s*$', 'm'));
				return bare ? bare[1].replace(/^['"]|['"]$/g, '') : '';
			}

			/* Delta-rebase: применяет ДЕЛЬТУ юзера (added/removed относительно
			   снэпшота origTags) на ЖИВЫЕ теги из репо. Это предотвращает
			   обнуление тегов, добавленных LLM-теггером ПОСЛЕ build-time снэпшота
			   (баг с постом 455: снэпшот был пустой, save затёр живые LLM-теги). */
			function rebaseTags(liveTags, origTags, newTags) {
				if (!Array.isArray(origTags)) return newTags.slice(); // нет baseline → blind
				const added = newTags.filter((t) => !origTags.includes(t));
				const removed = origTags.filter((t) => !newTags.includes(t));
				const kept = liveTags.filter((t) => !removed.includes(t));
				for (const t of added) if (!kept.includes(t)) kept.push(t);
				return kept;
			}

			// Структурированная ошибка сохранения: code = 'auth'|'gone'|'conflict'|'fm'|'net'|'http'
			function saveError(code, msg) {
				const e = new Error(msg);
				e.code = code;
				return e;
			}
			// HTTP-статус → код категории
			function httpToCode(status) {
				if (status === 401 || status === 403) return 'auth';
				if (status === 404) return 'gone';
				if (status === 409) return 'conflict';
				return 'http';
			}

			/**
			 * Сохраняет теги одного поста через GitHub Contents API.
			 * Delta-rebase поверх живых тегов. Свежий sha берётся GET'ом
			 * непосредственно перед каждым PUT. На 409 (sha разъехался между
			 * GET и PUT) — авто-ретрай ОДИН раз со свежим sha. Дальше — ошибка.
			 * Бросает saveError со .code для человекочитаемых сообщений.
			 * Возвращает { unchanged, finalTags } — финальные теги в репо.
			 */
			async function saveTagsForPost(slug, newTags, pat, origTags) {
				const path = 'src/content/blog/' + slug + '.md';
				const getUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`;
				const putUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;

				async function attempt() {
					// Свежий sha — cache-bust GET (CDN может отдать stale sha → 409).
					let r1;
					try {
						r1 = await fetch(getUrl + '&_=' + Date.now(), {
							headers: { Authorization: 'token ' + pat, Accept: 'application/vnd.github+json' },
							cache: 'no-store',
						});
					} catch (e) {
						throw saveError('net', 'нет сети');
					}
					if (r1.status === 404) throw saveError('gone', 'файл не найден на сервере');
					if (!r1.ok) throw saveError(httpToCode(r1.status), 'GET ' + r1.status);
					const data1 = await r1.json();
					const md = base64ToUtf8(data1.content);
					const liveTags = parseTagsFromMd(md);
					const finalTags = rebaseTags(liveTags, origTags, newTags);
					const newMd = patchFrontmatterTags(md, finalTags);
					if (newMd == null) throw saveError('fm', 'frontmatter не найден');
					if (newMd === md) return { unchanged: true, finalTags };

					let r2;
					try {
						r2 = await fetch(putUrl, {
							method: 'PUT',
							headers: {
								Authorization: 'token ' + pat,
								Accept: 'application/vnd.github+json',
								'Content-Type': 'application/json',
							},
							body: JSON.stringify({
								message: 'admin: update tags для ' + slug,
								content: utf8ToBase64(newMd),
								sha: data1.sha,
								branch: BRANCH,
							}),
						});
					} catch (e) {
						throw saveError('net', 'нет сети');
					}
					if (r2.status === 409) return { conflict: true };
					if (r2.status === 404) throw saveError('gone', 'файл удалён на сервере');
					if (!r2.ok) throw saveError(httpToCode(r2.status), 'PUT ' + r2.status);
					return { unchanged: false, finalTags };
				}

				let res = await attempt();
				if (res.conflict) res = await attempt(); // ровно 1 ретрай со свежим sha
				if (res.conflict) throw saveError('conflict', 'файл изменился на сервере');
				return res;
			}

			// Код ошибки → короткое русское сообщение + actionable next step
			function humanSaveMsg(code) {
				switch (code) {
					case 'auth':     return 'PAT истёк или нет доступа';
					case 'gone':     return 'пост переименован или удалён на сервере — нажми «обновить список»';
					case 'conflict': return 'файл изменился на сервере, нажми «обновить список» и попробуй снова';
					case 'fm':       return 'не нашёл frontmatter в файле';
					case 'net':      return 'нет сети';
					default:         return 'ошибка сохранения';
				}
			}

			async function savePost(p, pat, options) {
				options = options || {};
				p._saveStatus = 'saving';
				p._saveMsg = '';
				p._saveCode = '';
				if (!options.silent && activeTab === 'posts') rerenderPostInPlace(p);
				try {
					const res = await saveTagsForPost(p.slug, p._tags, pat, p._orig);
					// Синкаем UI к фактически записанным тегам (delta-rebase мог
					// сохранить живые LLM-теги, которых не было в снэпшоте).
					if (res && Array.isArray(res.finalTags)) p._tags = res.finalTags.slice();
					// _orig = _tags → пост покидает dirty-set, следующая правка
					// возьмёт свежий sha и не упрётся в 409 на устаревшем.
					p._orig = p._tags.slice();
					p._saveStatus = 'ok';
					p._saveMsg = '';
					p._saveCode = '';
					p._stale = false;
					p._isNew = false;
					p._tagsLoaded = true;
				} catch (e) {
					const code = (e && e.code) ? e.code : 'http';
					p._saveStatus = 'err';
					p._saveCode = code;
					p._saveMsg = humanSaveMsg(code);
					// файл пропал/переименован → визуально метим stale
					if (code === 'gone') p._stale = true;
				}
				if (!options.silent && activeTab === 'posts') rerenderPostInPlace(p);
				updateDirtyBadge();
			}

			// ====================================================
			// beforeunload — warn о несохранённых
			// ====================================================
			window.addEventListener('beforeunload', (e) => {
				if (dirtyPosts().length > 0) {
					e.preventDefault();
					e.returnValue = '';
				}
			});

			// ====================================================
			// bootstrap — ПОСЛЕ всех деклараций (POSTS, функций, addEventListener'ов)
			// ====================================================
			if (sessionStorage.getItem(LS_PW_OK_KEY) === '1') afterPasswordOk();
			else showPwGate();
		})();</script> </body> </html>
